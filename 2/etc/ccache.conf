# Maximum cache size to maintain
max_size = 10.0G

# Allow others to run 'ebuild' and share the cache.
umask = 002

# Don't include the current directory when calculating
# hashes for the cache. This allows re-use of the cache
# across different package versions, at the cost of
# slightly incorrect paths in debugging info.
# https://ccache.dev/manual/4.4.html#_performance
hash_dir = false

# Preserve cache across GCC rebuilds and
# introspect GCC changes through GCC wrapper.
#
# We use -dumpversion here instead of -v,
# see https://bugs.gentoo.org/872971.
compiler_check = %compiler% -dumpversion

compression = true
compression_level = 12

# The following is AI-generated to maybe improve kernel cache hits.
# Idk.
#
# Enable cross-patch-version cache sharing for kernel builds.
#
# The two headers below are auto-generated on every build and change with
# every patch release (e.g. 6.19.12 -> 6.19.13):
#
#   utsrelease.h:           #define UTS_RELEASE "6.19.12"
#   uapi/linux/version.h:   #define LINUX_VERSION_CODE 398092
#
# They appear in virtually every kernel TU's manifest, causing ~99.5% cache
# misses between patch releases despite the source being identical.
#
# This is safe for same-major.minor (6.19.X) patch upgrades because:
#   - LINUX_VERSION_CODE version guards don't change between patch releases
#   - vermagic (module loading gate) is assembled at link time, not per-.o
#   - Files that actually changed in the patch still miss on source content
#   - autoconf.h (.config) is intentionally NOT listed here, so kernel config
#     changes (e.g. switching default_qdisc) correctly cause recompilation
#
# Paths must match the manifest format: relative with ./ prefix, since these
# files live in the build directory (already handled by hash_dir = false).
ignore_headers_in_manifest = ./include/generated/utsrelease.h:./include/generated/uapi/linux/version.h

# default/linux/amd64/23.0/desktop/gnome/systemd

CC="clang"
CPP="clang-cpp"
CXX="clang++"
AR="llvm-ar"
NM="llvm-nm"
RANLIB="llvm-ranlib"
LD="ld.lld"
OBJCOPY="llvm-objcopy"
STRIP="llvm-strip"
OBJDUMP="llvm-objdump"
READELF="llvm-readelf"

CFLAGS="-fdata-sections -ffp-contract=fast -ffunction-sections -flto=thin -fno-asynchronous-unwind-tables -fno-math-errno -fno-plt -fno-semantic-interposition -march=goldmont-plus -O2 -pipe"
CXXFLAGS="${CFLAGS}"

FFLAGS="-fdata-sections -ffunction-sections -flto -fno-asynchronous-unwind-tables -fno-math-errno -fno-plt -fno-semantic-interposition -fno-trapping-math -march=goldmont-plus -O2 -pipe"
FCFLAGS="${FFLAGS}"

ORIGINAL_LDFLAGS="${LDFLAGS}"

LDFLAGS="${ORIGINAL_LDFLAGS} ${CFLAGS} -fuse-ld=lld -Wl,--gc-sections -Wl,--lto-O2 -Wl,--undefined-version"

RUSTFLAGS="--codegen linker-plugin-lto --codegen opt-level=2 --codegen target-cpu=goldmont-plus"

CGO_CFLAGS="${CFLAGS}"
CGO_CXXFLAGS="${CXXFLAGS}"
CGO_FFLAGS="${FFLAGS}"
CGO_LDFLAGS="${LDFLAGS}"

GOAMD64="v2"

LLVM="1"
KCFLAGS="-fdata-sections -ffp-contract=fast -ffunction-sections -fno-asynchronous-unwind-tables -fno-math-errno -fno-semantic-interposition -march=goldmont-plus -O2 -pipe"

USE="clang default-lld dist-kernel fdk jemalloc ktls lto modules-sign mtp opus orc pgo pipewire profile samba screencast secureboot tcmalloc tpm vaapi vpx zeroconf zstd"

CURL_SSL="gnutls"

ACCEPT_LICENSE="*"

EMERGE_DEFAULT_OPTS="--getbinpkgonly --jobs=2 --quiet-build --with-bdeps=n"

FEATURES="-ebuild-locks -merge-wait binpkg-request-signature parallel-fetch parallel-install"

GENTOO_MIRRORS="http://distfiles.gentoo.org"

LC_MESSAGES=C.utf8

# Secure Boot signing keys (injected at build time)
SECUREBOOT_SIGN_KEY="/root/secureboot/db.key"
SECUREBOOT_SIGN_CERT="/root/secureboot/db.pem"
MODULES_SIGN_KEY="/root/secureboot/db.key"
MODULES_SIGN_CERT="/root/secureboot/db.pem"

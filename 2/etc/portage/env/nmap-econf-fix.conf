# Portage environment override to fix net-analyzer/nmap build failure
# caused by a stray 'no' argument in myeconfargs when USE="-libssh2"

pre_src_configure() {
    # Save the original econf function if it exists and hasn't been saved yet
    if declare -f econf >/dev/null && ! declare -f original_econf >/dev/null; then
        eval "original_econf() $(declare -f econf | tail -n +2)"
        
        # Redefine econf to filter out the 'no' argument
        econf() {
            local args=()
            for arg in "$@"; do
                if [[ "$arg" != "no" ]]; then
                    args+=("$arg")
                fi
            done
            original_econf "${args[@]}"
        }
    fi
}

CC="gcc"
CXX="g++"
CPP="gcc -E"
AR="ar"
NM="nm"
RANLIB="ranlib"
LD="ld.bfd"

CFLAGS="-fdata-sections -ffunction-sections -flto -fno-asynchronous-unwind-tables -fno-math-errno -fno-plt -fno-semantic-interposition -fno-trapping-math -march=goldmont-plus -O2 -pipe"
CXXFLAGS="${CFLAGS}"

LDFLAGS="${ORIGINAL_LDFLAGS} ${CFLAGS} -fuse-ld=bfd -Wl,--gc-sections"

RUSTFLAGS="--codegen target-cpu=goldmont-plus"

CGO_CFLAGS="${CFLAGS}"
CGO_CXXFLAGS="${CXXFLAGS}"

QMAKESPEC="linux-g++"

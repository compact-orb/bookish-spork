name: 2 Emerge Kernel

on:
  workflow_dispatch:
    inputs:
      ephemeral:
        description: 'Do not update the layer'
        required: false
        type: boolean
        default: false
      force_rebuild:
        description: 'Force a rebuild of the layer (ignore existing)'
        required: false
        type: boolean
        default: false
      no-update:
        description: 'Do not update packages'
        required: false
        type: boolean
        default: false
      packages:
        description: 'Only emerge the specified packages'
        required: false
        type: string
      usepkg-exclude:
        description: 'Exclude packages from usepkg'
        required: false
        type: string
      temporary:
        description: 'Upload layer as temporary'
        required: false
        type: boolean
        default: false
      force_rebuild_ccache:
        description: 'Force a rebuild of the ccache layer (ignore existing)'
        required: false
        type: boolean
        default: false
#   schedule:
#     - cron: '15 8 * * *'

env:
  BUNNY_STORAGE_ACCESS_KEY: ${{ secrets.BUNNY_STORAGE_ACCESS_KEY }}
  BUNNY_STORAGE_CDN: ${{ secrets.BUNNY_STORAGE_CDN }}
  BUNNY_STORAGE_ENDPOINT: ${{ secrets.BUNNY_STORAGE_ENDPOINT }}
  BUNNY_STORAGE_ENDPOINT_CDN: ${{ secrets.BUNNY_STORAGE_ENDPOINT_CDN }}
  BUNNY_STORAGE_ZONE_NAME: ${{ secrets.BUNNY_STORAGE_ZONE_NAME }}
  CONFIG_PREFIX: 2

jobs:
  emerge:
    name: Emerge
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Display Runner Info
        run: bash ./scripts/ShowRunnerInfo.sh

      - name: Set Up Gentoo
        env:
          FORCE_REBUILD_INPUT: ${{ inputs.force_rebuild }}
        run: |
          ARGS=("-File" "./scripts/PushPullImage.ps1" "-From" "-Overlay" "-LayerName" "kernel")
          if [ "$FORCE_REBUILD_INPUT" == "true" ]; then
            ARGS+=("-ForceRebuild")
          fi
          sudo --preserve-env pwsh "${ARGS[@]}"

      - name: Set Up Binary Packages
        run: sudo --preserve-env pwsh -File ./scripts/PushPullBinaryPackages.ps1 -From

      - name: Import Signing Key
        run: sudo --preserve-env pwsh -File ./scripts/Import-SigningKey.ps1
        env:
          BINPKG_GPG_SIGNING_KEY_BASE64: ${{ secrets.BINPKG_GPG_SIGNING_KEY_BASE64 }}
          SECUREBOOT_DB_KEY_BASE64: ${{ secrets.SECUREBOOT_DB_KEY_BASE64 }}
          SECUREBOOT_DB_CERT_BASE64: ${{ secrets.SECUREBOOT_DB_CERT_BASE64 }}
          REDESIGNED_BROCCOLI_SSH_KEY: ${{ secrets.REDESIGNED_BROCCOLI_SSH_KEY }}

      - name: Mount Filesystems
        run: sudo --preserve-env pwsh -File ./scripts/MountFilesystems.ps1


      - name: Emerge Ccache
        run: sudo --preserve-env chroot /mnt/gentoo bash /mnt/scripts/BuildPackages.sh --packages dev-util/ccache

      - name: Setup Ccache Storage
        if: ${{ github.event.inputs.force_rebuild_ccache != 'true' }}
        run: sudo --preserve-env pwsh -File ./scripts/PushPullCcache.ps1 -From -LayerName kernel

      - name: Enable Ccache
        run: sudo --preserve-env pwsh -File ./scripts/EnableCcache.ps1

      - name: Emerge
        env:
          NO_UPDATE_INPUT: ${{ inputs['no-update'] }}
          PACKAGES_INPUT: ${{ inputs.packages }}
          USEPKG_EXCLUDE_INPUT: ${{ inputs['usepkg-exclude'] }}
        run: |
          declare -a args
          if [ "$NO_UPDATE_INPUT" != "true" ]; then
            args+=( "--update" )
          fi

          if [ -n "$PACKAGES_INPUT" ]; then
            args+=( "--packages" )
            read -ra pkgs <<< "$PACKAGES_INPUT"
            args+=( "${pkgs[@]}" )
          else
            args+=( "--packages" )
            read -ra pkgs <<< "$(cat ./${CONFIG_PREFIX}-emerge-kernel.list | tr '\n' ' ')"
            args+=( "${pkgs[@]}" )
          fi

          if [ -n "$USEPKG_EXCLUDE_INPUT" ]; then
            read -ra excludes <<< "$USEPKG_EXCLUDE_INPUT"
            for exclude in "${excludes[@]}"; do
              args+=( "--usepkg-exclude" "$exclude" )
            done
          fi
          sudo --preserve-env chroot /mnt/gentoo bash /mnt/scripts/BuildPackages.sh "${args[@]}"


      - name: Teardown Ccache
        if: ${{ !cancelled() }}
        run: sudo --preserve-env pwsh -File ./scripts/PushPullCcache.ps1 -To -LayerName kernel

      - name: Unmount Filesystems
        if: ${{ !cancelled() }}
        run: sudo --preserve-env pwsh -File ./scripts/MountFilesystems.ps1 -Unmount

      - name: Upload Gentoo Binary Packages
        if: ${{ !cancelled() }}
        run: sudo --preserve-env pwsh -File ./scripts/PushPullBinaryPackages.ps1 -To

      - name: Upload Gentoo Layer
        if: ${{ !cancelled() && !inputs.ephemeral }}
        env:
          TEMPORARY_INPUT: ${{ inputs.temporary }}
        run: |
          ARGS=("-File" "./scripts/PushPullImage.ps1" "-To" "-Overlay" "-LayerName" "kernel")
          if [ "$TEMPORARY_INPUT" == "true" ]; then
            ARGS+=("-Temporary")
          fi
          sudo --preserve-env pwsh "${ARGS[@]}"

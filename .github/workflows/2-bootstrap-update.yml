name: 2 Bootstrap Update

on:
  workflow_dispatch:
    inputs:
      skip-sync:
        description: 'Skip Portage tree sync'
        required: false
        default: false
        type: boolean
      skip-update:
        description: 'Skip package update'
        required: false
        default: false
        type: boolean
      reconfigure:
        description: 'Reconfigure system'
        required: false
        default: false
        type: boolean
      packages:
        description: 'Only update the specified packages (space separated)'
        required: false
        type: string
      deselect:
        description: 'Deselect the specified packages, then depclean'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force rebuild specified packages (ignores --update)'
        required: false
        default: false
        type: boolean
      oneshot:
        description: 'Do not select the specified packages'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '15 16 * * *'

env:
  BUNNY_STORAGE_ACCESS_KEY: ${{ secrets.BUNNY_STORAGE_ACCESS_KEY }}
  BUNNY_STORAGE_CDN: ${{ secrets.BUNNY_STORAGE_CDN }}
  BUNNY_STORAGE_ENDPOINT: ${{ secrets.BUNNY_STORAGE_ENDPOINT }}
  BUNNY_STORAGE_ENDPOINT_CDN: ${{ secrets.BUNNY_STORAGE_ENDPOINT_CDN }}
  BUNNY_STORAGE_ZONE_NAME: ${{ secrets.BUNNY_STORAGE_ZONE_NAME }}
  CONFIG_PREFIX: 2
  POWERSHELL_VERSION: '7.6.2'

jobs:
  bootstrap-update:
    name: Bootstrap Update
    runs-on: ubuntu-24.04
    steps:
      - uses: compact-orb/optimize-runner-network@ef43d041e33aea748679261dd588d6fbcccb95d0

      - name: Reclaim runner storage space
        uses: mathio/gha-cleanup@ce9480b80d151ff36572df0d3c54aef2653e6054
        with:
          remove-browsers: true

      - name: Cache PowerShell
        id: cache-powershell
        uses: actions/cache@v5
        with:
          path: ~/.powershell
          key: powershell-${{ env.POWERSHELL_VERSION }}-${{ runner.arch }}

      - name: Install PowerShell
        if: steps.cache-powershell.outputs.cache-hit != 'true'
        run: |
          ARCH=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          curl -L -o /tmp/powershell.tar.gz "https://github.com/PowerShell/PowerShell/releases/download/v${{ env.POWERSHELL_VERSION }}/powershell-${{ env.POWERSHELL_VERSION }}-linux-${ARCH}.tar.gz"
          mkdir -p ~/.powershell
          tar zxf /tmp/powershell.tar.gz -C ~/.powershell
          rm /tmp/powershell.tar.gz

      - name: Set Up PowerShell Symlink
        run: |
          chmod +x ~/.powershell/pwsh
          sudo ln -sf ~/.powershell/pwsh /usr/bin/pwsh

      - uses: actions/checkout@v6

      - name: Create Btrfs Image
        run: sudo --preserve-env pwsh -File ./scripts/CreateBtrfsImage.ps1

      - name: Display Runner Info
        run: bash ./scripts/ShowRunnerInfo.sh

      - name: Set Up Gentoo
        run: sudo --preserve-env pwsh -File ./scripts/PushPullImage.ps1 -From

      - name: Configure Gentoo
        if: ${{ inputs.reconfigure }}
        run: sudo --preserve-env pwsh -File ./scripts/SetConfiguration.ps1

      - name: Set Up Binary Packages
        if: ${{ !inputs['skip-update'] || inputs.force }}
        run: sudo --preserve-env pwsh -File ./scripts/PushPullBinaryPackages.ps1 -From

      - name: Import Signing Key
        run: sudo --preserve-env pwsh -File ./scripts/Import-SigningKey.ps1
        env:
          BINPKG_GPG_SIGNING_KEY_BASE64: ${{ secrets.BINPKG_GPG_SIGNING_KEY_BASE64 }}
          SECUREBOOT_DB_KEY_BASE64: ${{ secrets.SECUREBOOT_DB_KEY_BASE64 }}
          SECUREBOOT_DB_CERT_BASE64: ${{ secrets.SECUREBOOT_DB_CERT_BASE64 }}
          REDESIGNED_BROCCOLI_SSH_KEY: ${{ secrets.REDESIGNED_BROCCOLI_SSH_KEY }}

      - name: Mount Filesystems
        if: ${{ !inputs['skip-sync'] || !inputs['skip-update'] || inputs.deselect || inputs.force }}
        run: sudo --preserve-env pwsh -File ./scripts/MountFilesystems.ps1

      - name: Emerge Sync and Update
        if: ${{ !inputs['skip-sync'] || !inputs['skip-update'] || inputs.deselect || inputs.force }}
        env:
          PACKAGES_INPUT: ${{ inputs.packages }}
        run: |
          if [ "${{ inputs.deselect }}" == "true" ] && [ -z "$PACKAGES_INPUT" ]; then
            echo "::error::The 'deselect' option requires 'packages' to be provided."
            exit 1
          fi
          if [ "${{ inputs.force }}" == "true" ] && [ -z "$PACKAGES_INPUT" ]; then
            echo "::error::The 'force' option requires 'packages' to be provided."
            exit 1
          fi

          declare -a args
          if [ "${{ !inputs['skip-sync'] }}" == "true" ]; then
            args+=( "--sync" )
          fi

          if [ "${{ !inputs['skip-update'] }}" == "true" ] || [ "${{ inputs.deselect }}" == "true" ] || [ "${{ inputs.force }}" == "true" ]; then
            if [ "${{ inputs.force }}" != "true" ]; then
              args+=( "--update" )
            fi

            if [ -n "$PACKAGES_INPUT" ]; then
              args+=( "--packages" )
              read -ra pkgs <<< "$PACKAGES_INPUT"
              args+=( "${pkgs[@]}" )
            fi

            if [ "${{ inputs.deselect }}" == "true" ]; then
              args+=( "--deselect" )
            elif [ "${{ inputs.oneshot }}" == "true" ]; then
              args+=( "--oneshot" )
            fi
          fi

          sudo --preserve-env chroot /mnt/gentoo bash /mnt/scripts/BuildPackages.sh "${args[@]}"

      - name: Unmount Filesystems
        if: ${{ !cancelled() && (!inputs['skip-sync'] || !inputs['skip-update'] || inputs.deselect || inputs.force) }}
        run: sudo --preserve-env pwsh -File ./scripts/MountFilesystems.ps1 -Unmount

      - name: Upload Gentoo Binary Packages
        if: ${{ !cancelled() && (!inputs['skip-update'] || inputs.force) }}
        run: sudo --preserve-env pwsh -File ./scripts/PushPullBinaryPackages.ps1 -To

      - name: Upload Gentoo
        if: ${{ !cancelled() }}
        run: sudo --preserve-env pwsh -File ./scripts/PushPullImage.ps1 -To

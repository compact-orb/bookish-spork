# default/linux/amd64/23.0/no-multilib/systemd + features/selinux

CC="clang"
CPP="clang-cpp"
CXX="clang++"
AR="llvm-ar"
NM="llvm-nm"
RANLIB="llvm-ranlib"
LD="ld.lld"
OBJCOPY="llvm-objcopy"
STRIP="llvm-strip"
OBJDUMP="llvm-objdump"
READELF="llvm-readelf"

CFLAGS_NO_LTO_NO_POLLY="-fdata-sections -ffp-contract=fast -ffunction-sections -fno-asynchronous-unwind-tables -fno-math-errno -fno-plt -fno-semantic-interposition -march=x86-64-v3 -O3 -pipe"
CFLAGS_NO_LTO="${CFLAGS_NO_LTO_NO_POLLY} -Xclang=-mllvm -Xclang=-polly -Xclang=-mllvm -Xclang=-polly-vectorizer=stripmine -Xclang=-mllvm -Xclang=-polly-invariant-load-hoisting"

CFLAGS_NO_POLLY="${CFLAGS_NO_LTO_NO_POLLY} -flto=thin"
CFLAGS="${CFLAGS_NO_LTO} -flto=thin"
CXXFLAGS="${CFLAGS}"

FFLAGS_NO_LTO="-fdata-sections -ffunction-sections -fno-asynchronous-unwind-tables -fno-math-errno -fno-plt -fno-semantic-interposition -fno-trapping-math -march=x86-64-v3 -O3 -pipe"
FFLAGS="${FFLAGS_NO_LTO} -flto"
FCFLAGS="${FFLAGS}"

ORIGINAL_LDFLAGS="${LDFLAGS}"

LDFLAGS_NO_LTO_NO_POLLY="${ORIGINAL_LDFLAGS} ${CFLAGS_NO_LTO_NO_POLLY} -fuse-ld=lld -Wl,--gc-sections -Wl,--undefined-version"
LDFLAGS_NO_LTO="${ORIGINAL_LDFLAGS} ${CFLAGS_NO_LTO} -fuse-ld=lld -Wl,--gc-sections -Wl,--undefined-version"

LDFLAGS_NO_POLLY="${LDFLAGS_NO_LTO_NO_POLLY} -flto=thin -Wl,--lto-O3"
LDFLAGS="${LDFLAGS_NO_LTO} -flto=thin -Wl,--lto-O3"

RUSTFLAGS_NO_LTO="--codegen target-cpu=x86-64-v3"
RUSTFLAGS="${RUSTFLAGS_NO_LTO} --codegen linker-plugin-lto"

CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER="clang"

CGO_CFLAGS="${CFLAGS}"
CGO_CXXFLAGS="${CXXFLAGS}"
CGO_FFLAGS="${FFLAGS}"
CGO_LDFLAGS="${LDFLAGS}"

GOAMD64="v3"

LLVM="1"
KCFLAGS="-fno-asynchronous-unwind-tables -march=x86-64-v3 -O3 -pipe -mllvm -polly -mllvm -polly-vectorizer=stripmine -mllvm -polly-invariant-load-hoisting"

USE="clang default-lld dist-kernel jemalloc ktls lto modules-sign orc pgo profile secureboot tcmalloc tpm"

CURL_SSL="gnutls"

ACCEPT_LICENSE="*"

EMERGE_DEFAULT_OPTS="--getbinpkgonly --with-bdeps=n"

FEATURES="binpkg-request-signature"

GENTOO_MIRRORS="http://distfiles.gentoo.org"

FETCHCOMMAND="/usr/bin/aria2c --allow-overwrite=true --check-certificate=true --connect-timeout=30 --dir=\"\${DISTDIR}\" --file-allocation=none --max-concurrent-downloads=16 --max-connection-per-server=16 --max-tries=5 --min-split-size=1M --out=\"\${FILE}\" --split=16 --timeout=60 \"\${URI}\""
RESUMECOMMAND="/usr/bin/aria2c --allow-overwrite=true --check-certificate=true --connect-timeout=30 --continue=true --dir=\"\${DISTDIR}\" --file-allocation=none --max-concurrent-downloads=16 --max-connection-per-server=16 --max-tries=5 --min-split-size=1M --out=\"\${FILE}\" --split=16 --timeout=60 \"\${URI}\""

LC_MESSAGES=C.utf8

# default/linux/amd64/23.0/no-multilib/systemd

CC="clang"
CPP="clang-cpp"
CXX="clang++"
AR="llvm-ar"
NM="llvm-nm"
RANLIB="llvm-ranlib"
LD="ld.lld"
OBJCOPY="llvm-objcopy"
STRIP="llvm-strip"
OBJDUMP="llvm-objdump"
READELF="llvm-readelf"

CFLAGS="-fdata-sections -ffp-contract=fast -ffunction-sections -flto=thin -fno-asynchronous-unwind-tables -fno-math-errno -fno-plt -fno-semantic-interposition -march=x86-64-v3 -O3 -pipe"
CXXFLAGS="${CFLAGS}"

FFLAGS="-fdata-sections -ffunction-sections -flto -fno-math-errno -fno-semantic-interposition -fno-trapping-math -march=x86-64-v3 -O3 -pipe"
FCFLAGS="${FFLAGS} -fno-asynchronous-unwind-tables -fno-plt"

ORIGINAL_LDFLAGS="${LDFLAGS}"

LDFLAGS="${ORIGINAL_LDFLAGS} ${CFLAGS} -fuse-ld=lld -Wl,--gc-sections -Wl,--lto-O3 -Wl,--undefined-version"

RUSTFLAGS="--codegen linker-plugin-lto --codegen opt-level=3 --codegen target-cpu=x86-64-v3"

CGO_CFLAGS="${CFLAGS} -fno-asynchronous-unwind-tables -fno-plt"
CGO_CXXFLAGS="${CXXFLAGS}"
CGO_FFLAGS="${FFLAGS}"
CGO_LDFLAGS="${LDFLAGS}"

GOAMD64="v3"

LLVM="1"
KCFLAGS="-fdata-sections -ffp-contract=fast -ffunction-sections -fno-asynchronous-unwind-tables -fno-math-errno -fno-plt -fno-semantic-interposition -march=x86-64-v3 -O3 -pipe"

USE="clang default-lld dist-kernel jemalloc ktls lto modules-sign orc pgo profile secureboot tcmalloc tpm"

CURL_SSL="gnutls"

ACCEPT_LICENSE="*"

EMERGE_DEFAULT_OPTS="--getbinpkgonly --jobs=2 --quiet-build --with-bdeps=n"

FEATURES="-ebuild-locks -merge-wait binpkg-request-signature parallel-fetch parallel-install"

GENTOO_MIRRORS="http://distfiles.gentoo.org"

LC_MESSAGES=C.utf8

# Secure Boot signing keys (injected at build time)
SECUREBOOT_SIGN_KEY="/root/secureboot/db.key"
SECUREBOOT_SIGN_CERT="/root/secureboot/db.pem"
MODULES_SIGN_KEY="/root/secureboot/db.key"
MODULES_SIGN_CERT="/root/secureboot/db.pem"
